    <script>
        function submitForm(){
            var formData = $('#formData').serialize();
            var params = JSON.parse(formToJson(decodeURIComponent(formData, true)))
            params.p_file = p_file
            $("#checkFormCheckBox").attr('checked', checkForm(params));
            if(checkForm(params)) {
                alert("дҝқеӯҳжҲҗеҠҹпјҒ");
            }
        }

        function checkForm(params){
            if(params.type==""){
                alert("е•Ҷе“Ғзұ»еҲ«дёҚиғҪдёәз©ә")
                return false
            }else if(params.product_name == ""){
                alert("е•Ҷе“ҒеҗҚз§°дёҚиғҪдёәз©ә")
                return false
            }else if(params.unit == ""){
                alert("еҚ•дҪҚдёҚиғҪдёәз©ә")
                return false
            }else if(params.price == ""){
                alert("еҚ•д»·дёҚиғҪдёәз©ә")
                return false
            }else if(params.chengben == ""){
                alert("жҲҗжң¬дёҚиғҪдёәз©ә")
                return false
            }else if(params.tingyong == ""){
                alert("жҳҜеҗҰеҒңз”ЁдёҚиғҪдёәз©ә")
                return false
            }
            return true
        }

        function formToJson(data) {
            data = data.replace(/&/g, "\",\"").replace(/=/g, "\":\"").replace(/\+/g, " ").replace(/[\r\n]/g, "<br>");
            data = "{\"" + data + "\"}";
            return data;
        }
    </script>
